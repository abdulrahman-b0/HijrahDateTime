name: Run JVM Tests
on:
  push:
    branches: [ v2 ]
  pull_request:
    branches: [ v2 ]

  workflow_dispatch:
    inputs:
      module:
        description: 'Gradle module path (e.g., :library)'
        required: false
        default: ':library'

concurrency:
  group: ios-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # This official action handles caching and setup better than raw scripts
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-includes: |
            caches
            notifications

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew ${{ inputs.module || ':library' }}:jvmTest --no-daemon --stacktrace

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-test-reports
          path: |
            **/build/reports/tests/jvmTest/*
